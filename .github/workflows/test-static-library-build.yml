name: Test Static Library Build

on:
  workflow_dispatch:
  push:
    branches:
      - "maatheusgois-dd/add-rc-tags-on-pr-merge"

permissions:
  contents: write

jobs:
  test_static_library_build:
    name: Test Static Library Build and Package
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Clean Build Environment
      run: |
        echo "🧹 Cleaning previous builds..."
        rm -rf .build* XCFramework build* 2>/dev/null || true
        mkdir -p XCFramework/DebugSwift-StaticLibraries
        echo "✅ Environment cleaned"

    - name: Build iOS Device Static Library
      run: |
        echo "📱 Building for iOS device..."
        xcodebuild -scheme DebugSwift \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -derivedDataPath build-ios \
          build \
          BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
          SKIP_INSTALL=NO \
          ONLY_ACTIVE_ARCH=NO
        
        echo "🔨 Creating iOS static library..."
        cd build-ios/Build/Products/Release-iphoneos/
        ar rcs libDebugSwift-ios.a DebugSwift.o
        
        echo "📦 iOS library created:"
        ls -la libDebugSwift-ios.a
        file libDebugSwift-ios.a
        
        # Copy to target directory
        cp libDebugSwift-ios.a ../../../../XCFramework/DebugSwift-StaticLibraries/
        cp -R DebugSwift.swiftmodule ../../../../XCFramework/DebugSwift-StaticLibraries/
        cd ../../../../

    - name: Build iOS Simulator Static Library  
      run: |
        echo "🖥️  Building for iOS Simulator..."
        xcodebuild -scheme DebugSwift \
          -destination "generic/platform=iOS Simulator" \
          -configuration Release \
          -derivedDataPath build-simulator \
          build \
          BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
          SKIP_INSTALL=NO \
          ONLY_ACTIVE_ARCH=NO
        
        echo "🔨 Creating simulator static library..."
        cd build-simulator/Build/Products/Release-iphonesimulator/
        ar rcs libDebugSwift-simulator.a DebugSwift.o
        
        echo "📦 Simulator library created:"
        ls -la libDebugSwift-simulator.a
        file libDebugSwift-simulator.a
        
        # Copy to target directory  
        cp libDebugSwift-simulator.a ../../../../XCFramework/DebugSwift-StaticLibraries/
        cp -R DebugSwift.swiftmodule ../../../../XCFramework/DebugSwift-StaticLibraries/DebugSwift-Simulator.swiftmodule
        cd ../../../../

    - name: Create Documentation and Package
      run: |
        echo "📝 Creating comprehensive documentation..."
        
        # Create README
        cat > XCFramework/DebugSwift-StaticLibraries/README.md << 'EOF'
        # DebugSwift Static Libraries

        This package contains static libraries for DebugSwift framework built with Xcode.

        ## Contents
        - `libDebugSwift-ios.a` - iOS device build (arm64)
        - `libDebugSwift-simulator.a` - iOS simulator build (universal arm64+x86_64)
        - Swift modules for both architectures

        ## Installation & Usage

        ### Xcode Integration
        1. Drag both `.a` files into your Xcode project
        2. Add them to your target's "Frameworks, Libraries, and Embedded Content"
        3. Set "Embed" to "Do Not Embed" (they're static libraries)
        4. Add Swift module directories to "Swift Compiler - Search Paths" 
        5. Add `import DebugSwift` to your Swift files

        ### Build Configuration
        The correct library will be automatically selected based on your build target:
        - iOS Device builds will use `libDebugSwift-ios.a`
        - iOS Simulator builds will use `libDebugSwift-simulator.a`

        ## Architecture Support
        - iOS Device: arm64
        - iOS Simulator: arm64 + x86_64 (universal)
        - Minimum iOS Version: 14.0

        ## Integration Example
        ```swift
        import DebugSwift
        
        // Initialize DebugSwift in your AppDelegate or App struct
        DebugSwift.shared.start()
        ```

        ## Troubleshooting
        - **"No such module 'DebugSwift'"**: Check Swift Import Paths in build settings
        - **Linking errors**: Ensure both .a files are added to target
        - **Simulator issues**: Verify you're using the simulator library for simulator builds
        EOF

        # Create usage guide
        cat > XCFramework/DebugSwift-StaticLibraries/USAGE_GUIDE.md << 'EOF'
        # DebugSwift Static Library Integration Guide

        ## Quick Start Steps

        1. **Download & Extract**:
           - Download `DebugSwift-StaticLibraries.zip`
           - Extract to get the `.a` files and Swift modules

        2. **Add to Xcode Project**:
           - Drag `libDebugSwift-ios.a` and `libDebugSwift-simulator.a` into your project
           - Choose "Add to target" for your main app target
           - Select "Create groups" (not folder references)

        3. **Configure Build Settings**:
           - Target → Build Settings → Library Search Paths → Add path to .a files
           - Target → Build Settings → Swift Import Paths → Add paths to .swiftmodule directories

        4. **Use in Code**:
           ```swift
           import DebugSwift
           
           class AppDelegate: UIResponder, UIApplicationDelegate {
               func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                   DebugSwift.shared.start()
                   return true
               }
           }
           ```

        ## File Structure After Integration
        ```
        YourProject/
        ├── DebugSwift-StaticLibraries/
        │   ├── libDebugSwift-ios.a
        │   ├── libDebugSwift-simulator.a
        │   ├── DebugSwift.swiftmodule/
        │   └── DebugSwift-Simulator.swiftmodule/
        └── YourApp/
            └── (your app files)
        ```

        ## Build Settings Configuration
        Add these paths to your target's build settings:
        - **Library Search Paths**: `$(PROJECT_DIR)/DebugSwift-StaticLibraries`
        - **Swift Import Paths**: 
          - `$(PROJECT_DIR)/DebugSwift-StaticLibraries/DebugSwift.swiftmodule`
          - `$(PROJECT_DIR)/DebugSwift-StaticLibraries/DebugSwift-Simulator.swiftmodule`
        EOF

    - name: Package Static Libraries
      run: |
        echo "📦 Creating final package..."
        
        echo "📊 Package contents before zip:"
        ls -la XCFramework/DebugSwift-StaticLibraries/
        
        echo "📏 File sizes:"
        du -h XCFramework/DebugSwift-StaticLibraries/*
        
        # Create ZIP package
        cd XCFramework
        zip -r "DebugSwift-StaticLibraries.zip" "DebugSwift-StaticLibraries"
        cd ..
        
        echo "✅ Package created successfully!"
        ls -la XCFramework/
        
        echo "📦 Final package contents:"
        unzip -l XCFramework/DebugSwift-StaticLibraries.zip | head -30

    - name: Test Package Integrity
      run: |
        echo "🧪 Testing package integrity..."
        
        # Verify both libraries exist and are valid
        if [ -f "XCFramework/DebugSwift-StaticLibraries/libDebugSwift-ios.a" ]; then
          echo "✅ iOS library exists"
          file XCFramework/DebugSwift-StaticLibraries/libDebugSwift-ios.a
        else
          echo "❌ iOS library missing"
          exit 1
        fi
        
        if [ -f "XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a" ]; then
          echo "✅ Simulator library exists"  
          file XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a
        else
          echo "❌ Simulator library missing"
          exit 1
        fi
        
        # Verify Swift modules exist
        if [ -d "XCFramework/DebugSwift-StaticLibraries/DebugSwift.swiftmodule" ]; then
          echo "✅ iOS Swift modules exist"
        else
          echo "❌ iOS Swift modules missing"
          exit 1
        fi
        
        if [ -d "XCFramework/DebugSwift-StaticLibraries/DebugSwift-Simulator.swiftmodule" ]; then
          echo "✅ Simulator Swift modules exist"
        else
          echo "❌ Simulator Swift modules missing" 
          exit 1
        fi
        
        # Verify documentation exists
        if [ -f "XCFramework/DebugSwift-StaticLibraries/README.md" ]; then
          echo "✅ Documentation exists"
        else
          echo "❌ Documentation missing"
          exit 1
        fi
        
        echo "🎉 All tests passed! Package is ready for distribution."

    - name: Upload Test Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DebugSwift-StaticLibraries-Test
        path: XCFramework/DebugSwift-StaticLibraries.zip
        retention-days: 7

    - name: Test Results Summary
      run: |
        echo "🎉 Test Build Complete!"
        echo ""
        echo "📋 Build Results:"
        echo "✅ iOS Device Library: Built successfully"
        echo "✅ iOS Simulator Library: Built successfully (universal arm64+x86_64)"
        echo "✅ Swift Modules: Included for both platforms"  
        echo "✅ Documentation: Created (README.md + USAGE_GUIDE.md)"
        echo "✅ Package Integrity: All tests passed"
        echo "✅ Final Package: DebugSwift-StaticLibraries.zip"
        echo ""
        echo "📦 Package Size: $(du -h XCFramework/DebugSwift-StaticLibraries.zip | cut -f1)"
        echo "🔗 Download Artifact: Available in GitHub Actions artifacts"
        echo ""
        echo "🚀 Ready to integrate into main git-version.yml workflow!"