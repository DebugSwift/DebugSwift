name: Auto Tag and Version

on:
  push:
    branches: 
      - "main"
  workflow_dispatch:

permissions:
   actions: write
   checks: write
   contents: write
   deployments: write
   issues: write
   packages: write
   pull-requests: write
   repository-projects: write
   security-events: write
   statuses: write

jobs:
  git_version:
    name: Determine current version
    runs-on: macos-15
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      preReleaseTag: ${{ steps.gitversion.outputs.preReleaseTag }}
      preReleaseNumber: ${{ steps.gitversion.outputs.preReleaseNumber }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4

    - name: Display GitVersion
      run: |
        NEW_TAG="${{ steps.gitversion.outputs.semVer }}"
        echo "Semantic Version: $NEW_TAG"
        echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

  tag:
    name: Create tag and update podspec
    needs: 
      - git_version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Update podspec version
      run: |
        NEW_VERSION="${{ needs.git_version.outputs.majorMinorPatch }}"
        echo "Updating podspec version to: $NEW_VERSION"
        
        # Update the version in DebugSwift.podspec
        sed -i "s/s\.version.*=.*/s.version          = '$NEW_VERSION'/" DebugSwift.podspec
        
        # Verify the change
        grep "s.version" DebugSwift.podspec

    - name: Commit podspec changes
      env:
        GITHUB_TOKEN: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "GitHub Actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        NEW_VERSION="${{ needs.git_version.outputs.majorMinorPatch }}"
        CURRENT_BRANCH="${{ github.ref_name }}"
        
        # Check if there are changes to commit
        if git diff --quiet DebugSwift.podspec; then
          echo "No changes to podspec version"
        else
          git add DebugSwift.podspec
          git commit -m "chore: update podspec version to $NEW_VERSION [skip ci]"
          
          # Push to the appropriate branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Pushing to main branch"
            git push origin main
          else
            echo "Pushing to current branch: $CURRENT_BRANCH"
            git push origin HEAD
          fi
        fi

    - name: Push Git Tag
      env:
        GITHUB_TOKEN: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "GitHub Actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        TAG_NAME="${{ needs.git_version.outputs.semVer }}"
        
        # Only create and push tags when on main branch
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "Creating and pushing tag: $TAG_NAME"
          git tag $TAG_NAME
          git push origin $TAG_NAME
        else
          echo "Not on main branch, skipping tag creation"
        fi

  build_xcframework:
    name: Build and Upload XCFramework  
    needs: git_version
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Build XCFramework
      run: |
        echo "🏗️  Building DebugSwift using Swift Package Manager..."
        
        # Create output directories  
        mkdir -p build XCFramework
        
        # Use Swift Package Manager approach to avoid Xcode interface generation issues
        echo "📱 Building static library for iOS device (arm64)..."
        swift build -c release \
          --arch arm64 \
          -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
          -Xswiftc -target -Xswiftc arm64-apple-ios14.0
        
        echo "🖥️  Building static library for iOS Simulator (arm64)..."
        swift build -c release \
          --arch arm64 \
          -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphonesimulator --show-sdk-path) \
          -Xswiftc -target -Xswiftc arm64-apple-ios14.0-simulator
        
        echo "🖥️  Building static library for iOS Simulator (x86_64)..."
        swift build -c release \
          --arch x86_64 \
          -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphonesimulator --show-sdk-path) \
          -Xswiftc -target -Xswiftc x86_64-apple-ios14.0-simulator
        
        # Create static library package
        mkdir -p XCFramework/DebugSwift-StaticLibraries
        
        # Copy libraries with fallback paths
        echo "📦 Packaging static libraries..."
        cp .build/arm64-apple-ios/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-ios.a 2>/dev/null || \
        cp .build/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-ios.a
        
        # Create universal simulator library
        if [ -f ".build/arm64-apple-ios-simulator/release/libDebugSwift.a" ] && [ -f ".build/x86_64-apple-ios-simulator/release/libDebugSwift.a" ]; then
          echo "🔨 Creating universal simulator library..."
          lipo -create \
            .build/arm64-apple-ios-simulator/release/libDebugSwift.a \
            .build/x86_64-apple-ios-simulator/release/libDebugSwift.a \
            -output XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a
        else
          cp .build/arm64-apple-ios-simulator/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a 2>/dev/null || \
          cp .build/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a
        fi
        
        # Copy Swift modules if available
        echo "📋 Copying Swift modules..."
        find .build -name "*.swiftmodule" -exec cp -R {} XCFramework/DebugSwift-StaticLibraries/ \; 2>/dev/null || true
        
        # Create comprehensive README for usage
        cat > XCFramework/DebugSwift-StaticLibraries/README.md << 'EOF'
# DebugSwift Static Libraries

This package contains static libraries for DebugSwift framework built with Swift Package Manager.

## Contents
- `libDebugSwift-ios.a` - iOS device build (arm64)
- `libDebugSwift-simulator.a` - iOS simulator build (universal arm64+x86_64)
- Swift modules (if available)

## Installation & Usage

### Xcode Integration
1. Drag both `.a` files into your Xcode project
2. Add them to your target's "Frameworks, Libraries, and Embedded Content"
3. Set "Embed" to "Do Not Embed" (they're static libraries)
4. Add `import DebugSwift` to your Swift files

### Manual Linking
- For iOS device builds: Link against `libDebugSwift-ios.a`
- For iOS simulator builds: Link against `libDebugSwift-simulator.a`

### Build Settings
You may need to add the following to your target's build settings:
- Library Search Paths: Path to the directory containing the .a files
- Swift Import Paths: Path to any .swiftmodule directories

## Note
This static library package was created to avoid Swift module interface generation issues with XCFramework builds. It provides the same functionality as the framework version.
EOF

        # Create comprehensive usage guide
        cat > XCFramework/DebugSwift-StaticLibraries/USAGE_GUIDE.md << 'EOF'
# DebugSwift Static Library Integration Guide

## Quick Start

1. **Add to Xcode Project**:
   - Drag `libDebugSwift-ios.a` and `libDebugSwift-simulator.a` into your project
   - Choose "Add to target" for your main app target
   - Select "Create groups" (not folder references)

2. **Configure Build Settings**:
   - Target → Build Settings → Library Search Paths → Add the path to your .a files
   - Target → Build Settings → Swift Compiler → Import Paths → Add paths to any .swiftmodule directories

3. **Use in Code**:
   ```swift
   import DebugSwift
   
   // Initialize DebugSwift
   DebugSwift.shared.start()
   ```

## Troubleshooting

- **"No such module 'DebugSwift'"**: Check Swift Import Paths in build settings
- **Linking errors**: Ensure both .a files are added to target and Library Search Paths is set
- **Simulator issues**: Make sure you're using `libDebugSwift-simulator.a` for simulator builds

## Architecture Support
- iOS Device: arm64
- iOS Simulator: arm64 + x86_64 (universal)
- Minimum iOS Version: 14.0
EOF
        
        echo "📦 Creating static library package ZIP..."
        cd XCFramework  
        zip -r "DebugSwift-StaticLibraries.zip" "DebugSwift-StaticLibraries"
        cd ..
        
        echo "✅ Build completed successfully!"
        echo "📊 Build output:"
        ls -la XCFramework/
        
        echo "📏 File sizes:"
        du -h XCFramework/*
        
        echo "🔍 Package contents:"
        unzip -l XCFramework/DebugSwift-StaticLibraries.zip

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.git_version.outputs.semVer }}
        release_name: Release ${{ needs.git_version.outputs.semVer }}
        body: |
          🚀 **Release ${{ needs.git_version.outputs.semVer }}**
          
          **What's New:**
          - Auto-generated from main branch
          - Includes Static Libraries for iOS development
          - Built with Swift Package Manager to ensure compatibility
          
          **Installation:**
          1. Download `DebugSwift-StaticLibraries.zip`
          2. Extract and add both `.a` files to your Xcode project
          3. Link the libraries to your target (see README.md for details)
          
          **Version Details:**
          - Semantic Version: ${{ needs.git_version.outputs.semVer }}
          - Major.Minor.Patch: ${{ needs.git_version.outputs.majorMinorPatch }}
        draft: false
        prerelease: false

    - name: Upload Static Libraries Package to Release
      run: |
        # Upload the static libraries package
        if [ -f "XCFramework/DebugSwift-StaticLibraries.zip" ]; then
          echo "📦 Uploading DebugSwift Static Libraries package..."
          gh release upload ${{ needs.git_version.outputs.semVer }} \
            "XCFramework/DebugSwift-StaticLibraries.zip" \
            --clobber
          echo "✅ Static Libraries package uploaded successfully!"
        else
          echo "❌ Static Libraries package not found"
          ls -la XCFramework/
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


