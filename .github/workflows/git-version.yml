name: Auto Tag and Version

on:
  push:
    branches: 
      - "main"
  workflow_dispatch:

permissions:
   actions: write
   checks: write
   contents: write
   deployments: write
   issues: write
   packages: write
   pull-requests: write
   repository-projects: write
   security-events: write
   statuses: write

jobs:
  git_version:
    name: Determine current version
    runs-on: macos-15
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      preReleaseTag: ${{ steps.gitversion.outputs.preReleaseTag }}
      preReleaseNumber: ${{ steps.gitversion.outputs.preReleaseNumber }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4

    - name: Display GitVersion
      run: |
        NEW_TAG="${{ steps.gitversion.outputs.semVer }}"
        echo "Semantic Version: $NEW_TAG"
        echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

  tag:
    name: Create tag and update podspec
    needs: 
      - git_version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Update podspec version
      run: |
        NEW_VERSION="${{ needs.git_version.outputs.majorMinorPatch }}"
        echo "Updating podspec version to: $NEW_VERSION"
        
        # Update the version in DebugSwift.podspec
        sed -i "s/s\.version.*=.*/s.version          = '$NEW_VERSION'/" DebugSwift.podspec
        
        # Verify the change
        grep "s.version" DebugSwift.podspec

    - name: Commit podspec changes
      env:
        GITHUB_TOKEN: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "GitHub Actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        NEW_VERSION="${{ needs.git_version.outputs.majorMinorPatch }}"
        CURRENT_BRANCH="${{ github.ref_name }}"
        
        # Check if there are changes to commit
        if git diff --quiet DebugSwift.podspec; then
          echo "No changes to podspec version"
        else
          git add DebugSwift.podspec
          git commit -m "chore: update podspec version to $NEW_VERSION [skip ci]"
          
          # Push to the appropriate branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Pushing to main branch"
            git push origin main
          else
            echo "Pushing to current branch: $CURRENT_BRANCH"
            git push origin HEAD
          fi
        fi

    - name: Push Git Tag
      env:
        GITHUB_TOKEN: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "GitHub Actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        TAG_NAME="${{ needs.git_version.outputs.semVer }}"
        
        # Only create and push tags when on main branch
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "Creating and pushing tag: $TAG_NAME"
          git tag $TAG_NAME
          git push origin $TAG_NAME
        else
          echo "Not on main branch, skipping tag creation"
        fi

  build_xcframework:
    name: Build and Upload XCFramework  
    needs: git_version
    runs-on: macos-15
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'

    - name: Build XCFramework
      run: |
        echo "🏗️  Building XCFramework for release..."
        
        # Create output directories  
        mkdir -p build XCFramework
        
        # Try approach 1: Build without BUILD_LIBRARY_FOR_DISTRIBUTION to avoid interface issues
        echo "📱 Building for iOS device (arm64)..."
        xcodebuild -scheme DebugSwift \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -derivedDataPath build/ios \
          SKIP_INSTALL=NO \
          build
        
        echo "🖥️  Building for iOS Simulator (universal)..."
        xcodebuild -scheme DebugSwift \
          -destination "generic/platform=iOS Simulator" \
          -configuration Release \
          -derivedDataPath build/simulator \
          SKIP_INSTALL=NO \
          build
        
        # Find and copy the built frameworks
        IOS_FRAMEWORK_PATH=$(find build/ios -name "DebugSwift.framework" -path "*Release-iphoneos*" | head -1)
        SIM_FRAMEWORK_PATH=$(find build/simulator -name "DebugSwift.framework" -path "*Release-iphonesimulator*" | head -1)
        
        if [ -z "$IOS_FRAMEWORK_PATH" ] || [ -z "$SIM_FRAMEWORK_PATH" ]; then
          echo "❌ Framework build failed - trying alternative approach with static libraries..."
          
          # Alternative: Build static libraries and create simple package
          echo "📱 Building static library for iOS..."
          swift build -c release \
            --arch arm64 \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios14.0
            
          echo "🖥️  Building static library for iOS Simulator..."  
          swift build -c release \
            --arch arm64 \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphonesimulator --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios14.0-simulator
            
          # Create simple package
          mkdir -p XCFramework/DebugSwift-StaticLibraries
          cp .build/arm64-apple-ios/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-ios.a 2>/dev/null || \
          cp .build/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-ios.a
          
          cp .build/arm64-apple-ios-simulator/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a 2>/dev/null || \
          cp .build/release/libDebugSwift.a XCFramework/DebugSwift-StaticLibraries/libDebugSwift-simulator.a
          
          # Copy Swift modules if available
          find .build -name "*.swiftmodule" -exec cp -R {} XCFramework/DebugSwift-StaticLibraries/ \; 2>/dev/null || true
          
          # Create README for usage
          cat > XCFramework/DebugSwift-StaticLibraries/README.md << 'EOF'
# DebugSwift Static Libraries

This package contains static libraries for DebugSwift framework.

## Usage
1. Add both .a files to your Xcode project
2. Link against the appropriate architecture:
   - `libDebugSwift-ios.a` for iOS device builds
   - `libDebugSwift-simulator.a` for iOS simulator builds
3. Import Swift modules if available
4. Add to your project: `import DebugSwift`
EOF
          
          echo "📦 Creating static library package ZIP..."
          cd XCFramework  
          zip -r "DebugSwift-StaticLibraries.zip" "DebugSwift-StaticLibraries"
          cd ..
          
        else
          echo "✅ Found frameworks:"
          echo "iOS: $IOS_FRAMEWORK_PATH"
          echo "Simulator: $SIM_FRAMEWORK_PATH"
          
          # Create XCFramework from the built frameworks
          echo "🔨 Creating XCFramework..."
          xcodebuild -create-xcframework \
            -framework "$IOS_FRAMEWORK_PATH" \
            -framework "$SIM_FRAMEWORK_PATH" \
            -output "XCFramework/DebugSwift.xcframework"
          
          echo "📦 Creating XCFramework ZIP..."
          cd XCFramework
          zip -r "DebugSwift.xcframework.zip" "DebugSwift.xcframework"
          cd ..
        fi
        
        echo "✅ Build completed successfully!"
        echo "📊 Build output:"
        ls -la XCFramework/
        
        echo "📏 File sizes:"
        du -h XCFramework/*

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.git_version.outputs.semVer }}
        release_name: Release ${{ needs.git_version.outputs.semVer }}
        body: |
          🚀 **Release ${{ needs.git_version.outputs.semVer }}**
          
          **What's New:**
          - Auto-generated from main branch
          - Includes XCFramework for iOS development
          
          **Installation:**
          1. Download the framework package (XCFramework or Static Libraries)
          2. Extract and add to your Xcode project  
          3. Link the framework/libraries to your target
          
          **Version Details:**
          - Semantic Version: ${{ needs.git_version.outputs.semVer }}
          - Major.Minor.Patch: ${{ needs.git_version.outputs.majorMinorPatch }}
        draft: false
        prerelease: false

    - name: Upload Framework Package to Release
      run: |
        # Determine which package was created and upload it
        if [ -f "XCFramework/DebugSwift.xcframework.zip" ]; then
          echo "📦 Uploading XCFramework package..."
          gh release upload ${{ needs.git_version.outputs.semVer }} \
            "XCFramework/DebugSwift.xcframework.zip" \
            --clobber
        elif [ -f "XCFramework/DebugSwift-StaticLibraries.zip" ]; then
          echo "📦 Uploading Static Libraries package..."
          gh release upload ${{ needs.git_version.outputs.semVer }} \
            "XCFramework/DebugSwift-StaticLibraries.zip" \
            --clobber
        else
          echo "❌ No framework package found to upload"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


